<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabery Sport - Matchs en Direct</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-futbol"></i>
                <h1>Sabery Sport</h1>
            </div>
            <nav class="nav">
                <button class="nav-btn" data-section="live">
                    <i class="fas fa-broadcast-tower"></i>
                    <span>En Direct</span>
                </button>
                <button class="nav-btn" data-section="matches">
                    <i class="fas fa-calendar"></i>
                    <span>Matchs</span>
                </button>
                <button class="nav-btn" data-section="stats">
                    <i class="fas fa-chart-bar"></i>
                    <span>Statistiques</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- Section Matchs en Direct -->
            <section id="live" class="section active">
                <h2><i class="fas fa-broadcast-tower"></i> Matchs en Direct</h2>
                <div class="filters">
                    <select id="live-league-filter">
                        <option value="">Toutes les ligues</option>
                        <option value="PL">Premier League</option>
                        <option value="BL1">Bundesliga</option>
                        <option value="SA">Serie A</option>
                        <option value="PD">La Liga</option>
                        <option value="FL1">Ligue 1</option>
                        <option value="CL">Ligue des Champions</option>
                        <option value="EL">Ligue Europa</option>
                    </select>
                </div>
                <div id="live-matches" class="matches-grid">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Chargement des matchs en direct...</p>
                    </div>
                </div>
            </section>

            <!-- Section Liste des Matchs -->
            <section id="matches" class="section">
                <h2><i class="fas fa-calendar"></i> Liste des Matchs</h2>
                <div class="filters">
                    <input type="date" id="match-date" class="date-picker">
                    <select id="league-filter">
                        <option value="">Toutes les ligues</option>
                        <option value="PL">Premier League</option>
                        <option value="BL1">Bundesliga</option>
                        <option value="SA">Serie A</option>
                        <option value="PD">La Liga</option>
                        <option value="FL1">Ligue 1</option>
                        <option value="CL">Ligue des Champions</option>
                        <option value="EL">Ligue Europa</option>
                    </select>
                </div>
                <div id="match-list" class="matches-list">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Chargement des matchs...</p>
                    </div>
                </div>
            </section>

            <!-- Section Statistiques -->
            <section id="stats" class="section">
                <h2><i class="fas fa-chart-bar"></i> Statistiques</h2>
                <div class="filters">
                    <select id="stats-league-filter">
                        <option value="">Choisir une ligue</option>
                        <option value="PL">Premier League</option>
                        <option value="BL1">Bundesliga</option>
                        <option value="SA">Serie A</option>
                        <option value="PD">La Liga</option>
                        <option value="FL1">Ligue 1</option>
                        <option value="CL">Ligue des Champions</option>
                        <option value="EL">Ligue Europa</option>
                    </select>
                    <select id="stats-season-filter">
                        <option value="2023">2023/2024</option>
                        <option value="2022">2022/2023</option>
                        <option value="2021">2021/2022</option>
                    </select>
                </div>
                <div id="stats-content" class="stats-content">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Chargement des statistiques...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal pour détails du match -->
    <div id="match-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="match-details"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Sabery Sport. Tous droits réservés.</p>
            <p>Données fournies par API-Football</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
